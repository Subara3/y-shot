<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bodyGradW" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#B0BEC5"/>
    </linearGradient>
    <linearGradient id="tailGradW" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ECEFF1"/>
      <stop offset="100%" stop-color="#90A4AE"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="#263238" />
  <circle cx="256" cy="256" r="220" fill="none" stroke="#FFFFFF" stroke-width="3" opacity="0.2" />

  <!-- Shrimp body — geometric curved segments -->
  <path d="M 310 150
           Q 340 170, 335 200
           Q 330 230, 300 250
           Q 270 270, 240 285
           Q 210 300, 185 310
           Q 160 320, 145 325"
        fill="none" stroke="url(#bodyGradW)" stroke-width="52" stroke-linecap="round" />

  <!-- Body segment lines -->
  <line x1="332" y1="185" x2="300" y2="205" stroke="#263238" stroke-width="3" opacity="0.5" />
  <line x1="322" y1="220" x2="288" y2="235" stroke="#263238" stroke-width="3" opacity="0.5" />
  <line x1="300" y1="248" x2="265" y2="260" stroke="#263238" stroke-width="3" opacity="0.5" />
  <line x1="270" y1="272" x2="238" y2="282" stroke="#263238" stroke-width="3" opacity="0.5" />
  <line x1="237" y1="290" x2="208" y2="300" stroke="#263238" stroke-width="3" opacity="0.5" />

  <!-- Head -->
  <path d="M 310 150
           Q 330 130, 340 115
           L 355 105
           Q 365 115, 355 135
           Q 345 150, 335 160
           Q 325 165, 310 155"
        fill="url(#bodyGradW)" stroke="none" />

  <!-- Eye -->
  <circle cx="340" cy="125" r="8" fill="#263238" />
  <circle cx="342" cy="123" r="4" fill="#ECEFF1" />

  <!-- Antenna 1 -->
  <line x1="350" y1="108" x2="390" y2="65" stroke="#B0BEC5" stroke-width="4" stroke-linecap="round" />
  <circle cx="390" cy="65" r="5" fill="#B0BEC5" />

  <!-- Antenna 2 -->
  <line x1="355" y1="105" x2="405" y2="85" stroke="#B0BEC5" stroke-width="3" stroke-linecap="round" />
  <circle cx="405" cy="85" r="4" fill="#B0BEC5" />

  <!-- Tail fan -->
  <path d="M 145 325 L 105 340 L 95 370 L 115 355 Z" fill="url(#tailGradW)" />
  <path d="M 145 325 L 120 350 L 115 385 L 135 365 Z" fill="url(#tailGradW)" opacity="0.85" />
  <path d="M 145 325 L 140 360 L 145 395 L 155 370 Z" fill="url(#tailGradW)" opacity="0.7" />

  <!-- Legs -->
  <line x1="300" y1="250" x2="310" y2="290" stroke="#B0BEC5" stroke-width="3" stroke-linecap="round" />
  <line x1="275" y1="265" x2="282" y2="305" stroke="#B0BEC5" stroke-width="3" stroke-linecap="round" />
  <line x1="250" y1="280" x2="255" y2="318" stroke="#B0BEC5" stroke-width="3" stroke-linecap="round" />
  <line x1="222" y1="292" x2="225" y2="328" stroke="#B0BEC5" stroke-width="3" stroke-linecap="round" />

  <!-- Comparison arrows overlay — diff symbol -->
  <g opacity="0.35">
    <polygon points="430,380 460,410 445,410 445,445 415,445 415,410 400,410" fill="#FFFFFF" />
    <polygon points="430,470 400,440 415,440 415,405 445,405 445,440 460,440" fill="#90A4AE" />
  </g>

  <!-- Geometric accents -->
  <polygon points="180,180 200,170 210,185 200,200 180,200 170,185"
           fill="#FFFFFF" opacity="0.1" />
  <polygon points="130,260 145,252 153,264 145,276 130,276 122,264"
           fill="#FFFFFF" opacity="0.07" />
</svg>
